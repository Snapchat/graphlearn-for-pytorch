name: GLT CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'benchmarks/**'
      - 'docs/**'
      - 'examples/**'
      - '**.md'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'benchmarks/**'
      - 'docs/**'
      - 'examples/**'
      - '**.md'

env:
  IMAGE: graphlearn-torch-dev
  JOBNAME: glt-ci-${{ github.run_id }}
  DESTDIR: /mnt/graphlearn_for_pytorch
  MACHINE_NAME: glt-gpu-unittests-${{ github.run_id }}
  gcp_zone: us-central1-b
  PROJECT: external-snap-ci-github-gigl

jobs:
  create-gpu-runner:
    runs-on: ubuntu-latest
    steps:
      - name: Create GPU Runner
        uses: ./.github/actions/create_gpu_runner
        with:
          project: ${{ env.PROJECT }}
          zone: ${{ env.gcp_zone }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          machine_name: ${{ env.MACHINE_NAME }}
          machine_type: n1-standard-4
          accelerator_type: nvidia-tesla-p4
          accelerator_count: 1


  run-glt-unittests:
    needs: create-gpu-runner
    runs-on: self-hosted
    if: ${{ github.repository == 'snapchat/graphlearn-for-pytorch' }}
    steps:

      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Update submodules
        working-directory: ${{github.workspace}}
        run: |
          git submodule update --init

      - name: Build image
        working-directory: ${{github.workspace}}
        run: |
          docker build -f dockerfiles/${IMAGE}.Dockerfile -t ${IMAGE} .

      - name: Launch CI container
        working-directory: ${{github.workspace}}
        run: |
          bash scripts/launch_container.sh ${IMAGE} ${JOBNAME} ${DESTDIR}

      - name: Build wheel
        run: |
          docker exec ${JOBNAME} bash ${DESTDIR}/scripts/build_wheel.sh

      - name: Run cpp unit tests
        run: |
          docker exec ${JOBNAME} bash ${DESTDIR}/scripts/run_cpp_ut.sh

      - name: Run python unit tests
        run: |
          docker exec ${JOBNAME} bash ${DESTDIR}/scripts/run_python_ut.sh

      - name: Remove CI container
        if: always()
        working-directory: ${{github.workspace}}
        run: |
          bash scripts/remove_container.sh ${JOBNAME}
  
  shutdown_gpu_runner:
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Shutdown GPU Runner
        uses: ./.github/actions/shutdown_gcp_instance
        with:
          machine_name: ${{ env.MACHINE_NAME }}
          zone: ${{ env.gcp_zone }}
